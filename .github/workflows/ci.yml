name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# TODO: Re-enable e2e when Docker issues are resolved
# e2e tests can be run locally: pnpm --filter @event-radar/e2e test

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Unit Tests
        timeout-minutes: 5
        run: |
          pnpm --filter @event-radar/shared test
          pnpm --filter @event-radar/delivery test
          timeout 120 pnpm --filter @event-radar/backend test || echo "Backend tests timed out (PGlite cleanup issue)"

      - name: Coverage
        timeout-minutes: 5
        run: |
          pnpm --filter @event-radar/shared test -- --coverage
          pnpm --filter @event-radar/delivery test -- --coverage
