name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit Tests
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Install Playwright Browsers
        run: pnpm --filter @event-radar/e2e exec playwright install chromium

      - name: Start services for E2E tests
        run: |
          # Start PostgreSQL
          docker compose up -d postgres
          
          # Wait for PostgreSQL to be ready
          sleep 10
          
          # Run database migrations
          pnpm --filter @event-radar/backend run db:push || true

      - name: Start Backend
        run: |
          pnpm --filter @event-radar/backend run dev &
          sleep 10

      - name: Start Frontend
        run: |
          pnpm --filter @event-radar/frontend run dev &
          sleep 15

      - name: Run E2E Tests
        env:
          FRONTEND_URL: http://localhost:3000
          CI: true
        run: pnpm --filter @event-radar/e2e test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down || true
