services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
      POSTGRES_DB: event_radar
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d event_radar"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - event-radar-network

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - seen-ids:/tmp/event-radar-seen
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://radar:radar@postgres:5432/event_radar
      - BARK_KEY=${BARK_KEY:-}
      - BARK_SERVER_URL=${BARK_SERVER_URL:-https://api.day.app}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - API_KEY=${API_KEY:-er-dev-2026}
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_ENRICHMENT_ENABLED=${LLM_ENRICHMENT_ENABLED:-false}
      - LLM_GATEKEEPER_ENABLED=${LLM_GATEKEEPER_ENABLED:-false}
      - LLM_GATEKEEPER_API_KEY=${LLM_GATEKEEPER_API_KEY:-}
      - LLM_GATEKEEPER_MODEL=${LLM_GATEKEEPER_MODEL:-gpt-4o-mini}
      - BREAKING_NEWS_ENABLED=${BREAKING_NEWS_ENABLED:-true}
      - FEDWATCH_ENABLED=${FEDWATCH_ENABLED:-true}
      - WHITEHOUSE_ENABLED=${WHITEHOUSE_ENABLED:-true}
      - FEDERAL_REGISTER_ENABLED=${FEDERAL_REGISTER_ENABLED:-true}
      - FDA_ENABLED=${FDA_ENABLED:-true}
      - DOJ_ENABLED=${DOJ_ENABLED:-true}
      - CONGRESS_ENABLED=${CONGRESS_ENABLED:-true}
      - ECON_CALENDAR_ENABLED=${ECON_CALENDAR_ENABLED:-true}
      - SHORT_INTEREST_ENABLED=${SHORT_INTEREST_ENABLED:-true}
      - REDDIT_ENABLED=${REDDIT_ENABLED:-true}
      - STOCKTWITS_ENABLED=${STOCKTWITS_ENABLED:-true}
      - UNUSUAL_OPTIONS_ENABLED=${UNUSUAL_OPTIONS_ENABLED:-true}
      - ANALYST_ENABLED=${ANALYST_ENABLED:-true}
      - EARNINGS_ENABLED=${EARNINGS_ENABLED:-true}
      - SEC_EDGAR_ENABLED=${SEC_EDGAR_ENABLED:-false}
      - NEWSWIRE_ENABLED=${NEWSWIRE_ENABLED:-false}
      - HALT_SCANNER_ENABLED=${HALT_SCANNER_ENABLED:-false}
      - IR_MONITOR_ENABLED=${IR_MONITOR_ENABLED:-false}
      - DILUTION_SCANNER_ENABLED=${DILUTION_SCANNER_ENABLED:-false}
      - DELIVERY_GATE_MODE=${DELIVERY_GATE_MODE:-shadow}
      - WARN_ENABLED=${WARN_ENABLED:-true}
      - TRUTH_SOCIAL_ENABLED=${TRUTH_SOCIAL_ENABLED:-false}
      - X_SCANNER_ENABLED=${X_SCANNER_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - event-radar-network

  # SEC Scanner Python Service
  sec-scanner:
    build:
      context: ./services/sec-scanner
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      - BACKEND_URL=http://backend:3001
      - SEC_POLL_INTERVAL=30
      - SEC_USER_AGENT=EventRadar/0.1 (event-radar@example.com)
      - API_KEY=${API_KEY:-er-dev-2026}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - event-radar-network

networks:
  event-radar-network:
    driver: bridge

volumes:
  pgdata:
  seen-ids:
