services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
      POSTGRES_DB: event_radar
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d event_radar"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - event-radar-network

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://radar:radar@postgres:5432/event_radar
      - BARK_KEY=${BARK_KEY:-}
      - BARK_SERVER_URL=http://bark-server:8080
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - API_KEY=${API_KEY:-dev-api-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-radar-network

  # SEC Scanner Python Service
  sec-scanner:
    build:
      context: ./services/sec-scanner
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - BACKEND_URL=http://backend:3001
      - SEC_POLL_INTERVAL=30
      - SEC_USER_AGENT=EventRadar/0.1 (event-radar@example.com)
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - event-radar-network

  # Frontend Next.js Application
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_API_KEY=${API_KEY:-dev-api-key-change-in-production}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-radar-network

  # Bark Server (iOS Push Notifications)
  bark-server:
    image: finab/bark-server
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - bark-data:/data
    restart: unless-stopped
    networks:
      - event-radar-network

networks:
  event-radar-network:
    driver: bridge

volumes:
  pgdata:
  bark-data:
