services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://radar:radar@postgres:5432/event_radar
      - BARK_KEY=${BARK_KEY:-}
      - BARK_SERVER_URL=http://bark-server:8080
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy

  sec-scanner:
    build: services/sec-scanner
    ports:
      - "3002:3002"
    environment:
      - BACKEND_URL=http://app:3001
      - SEC_POLL_INTERVAL=30
      - SEC_USER_AGENT=EventRadar/0.1 (event-radar@example.com)
    depends_on:
      - app

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
      POSTGRES_DB: event_radar
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d event_radar"]
      interval: 5s
      timeout: 5s
      retries: 5

  bark-server:
    image: finab/bark-server
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - bark-data:/data
    restart: unless-stopped

volumes:
  pgdata:
  bark-data:
