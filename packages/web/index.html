<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Event Radar surfaces market-moving alerts with AI summaries and historical context."
    />
    <meta name="theme-color" content="#07111f" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Event Radar</title>
    <script>
      (function(){var t=localStorage.getItem('er-theme');if(t&&t!=='dark')localStorage.removeItem('er-theme');document.documentElement.classList.add('dark');document.documentElement.style.colorScheme='dark'})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
